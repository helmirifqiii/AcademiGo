<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lab TKJ - Firewall Scripting</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_firewall_script.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">AcademiCee - Security Terminal</div>
        <nav><a href="praktikum.html" class="btn-back">Kembali</a></nav>
    </header>

    <main class="container">
        <div class="mission-box">
            <h3>🛡️ Misi Keamanan:</h3>
            <p id="mission-text">Serangan masuk dari IP <b>10.0.0.5</b>! Gunakan perintah <code>block [ip]</code> untuk menghentikannya.</p>
        </div>

        <div class="terminal-container">
            <div id="traffic-monitor">
                <div class="monitor-header">Live Traffic Monitor</div>
                <div id="traffic-log"></div>
            </div>

            <div id="terminal">
                <div id="terminal-output">Firewall System v1.0. Ready...</div>
                <div class="input-line">
                    <span class="prompt">firewall@admin:#</span>
                    <input type="text" id="cmd-input" autofocus autocomplete="off">
                </div>
            </div>
        </div>
    </main>
    <script src="script_firewall_script.js"></script>
</body>
</html>
